<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lend Card - CredHand</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><strong>CredHand</strong></a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="card-title mb-4">Lend a Credit Card</h2>
                        <p class="text-muted mb-4">Fill in the details to request a credit card limit</p>

                        <form id="lendingForm">
                            <div class="mb-4">
                                <label for="purchaseType" class="form-label fw-bold">1. Purchase Type</label>
                                <select class="form-select form-select-lg" id="purchaseType" required>
                                    <option value="">Select a purchase type</option>
                                    <option value="flight">Flight Booking</option>
                                    <option value="shopping">Online Shopping</option>
                                    <option value="ecomm">E-Commerce</option>
                                    <option value="bills">Bills</option>
                                    <option value="rent">Rent</option>
                                    <option value="others">Others</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="cardSelect" class="form-label fw-bold">2. Select Credit Card</label>
                                <div id="cardSelect" class="row">
                                    <div class="text-center">
                                        <div class="spinner-border" role="status">
                                            <span class="visually-hidden">Loading...</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="amount" class="form-label fw-bold">3. Amount (₹)</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" class="form-control" id="amount" 
                                           placeholder="10 - 100000" min="10" max="100000" required>
                                </div>
                                <small class="form-text text-muted">Minimum ₹10, Maximum ₹1,00,000</small>
                            </div>

                            <!-- Charge Breakdown (Expandable) -->
                            <div class="card mb-4 bg-light">
                                <div class="card-header">
                                    <button class="btn btn-link w-100 text-start" type="button" 
                                            data-bs-toggle="collapse" data-bs-target="#chargeBreakdown">
                                        <strong>Service Charges</strong>
                                        <span class="float-end">▼</span>
                                    </button>
                                </div>
                                <div id="chargeBreakdown" class="collapse show">
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between mb-2">
                                            <span>Amount:</span>
                                            <strong id="displayAmount">₹0</strong>
                                        </div>
                                        <div class="d-flex justify-content-between mb-2">
                                            <span>Service Charge (0.3% or ₹100):</span>
                                            <strong id="displayCharge">₹0</strong>
                                        </div>
                                        <hr>
                                        <div class="d-flex justify-content-between">
                                            <span>Total to Pay:</span>
                                            <strong id="displayTotal" class="text-primary">₹0</strong>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">Pay Now</button>
                        </form>

                        <div id="errorAlert" class="alert alert-danger mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/lending.js"></script>
</body>
</html>
