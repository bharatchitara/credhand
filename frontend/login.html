<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CredHand</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <h1 class="card-title text-center mb-4">CredHand</h1>
                        <p class="text-center text-muted mb-4">Login to continue</p>
                        
                        <button class="btn btn-primary w-100 py-2 mb-3" id="googleLoginBtn">
                            <img src="https://www.gstatic.com/firebaseapp/v8.10.1/images/firebaseui-icon-16.png" alt="Google" class="me-2">
                            Login with Google
                        </button>

                        <p class="text-center text-muted small mt-3">
                            By logging in, you agree to our Terms of Service
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
